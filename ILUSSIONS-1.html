<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ILUSSIONS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --neon: #00ffe7; --dark: #020a0f; }
    body {
      background: var(--dark);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,255,231,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
      pointer-events: none; z-index: 0;
    }
    @keyframes gridShift { 0%{background-position:0 0} 100%{background-position:40px 40px} }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);
      pointer-events: none; z-index: 10;
    }
    .container {
      position: relative; z-index: 5;
      display: flex; flex-direction: column;
      align-items: center; gap: 18px;
    }
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      letter-spacing: 0.25em;
      text-shadow: 0 0 10px var(--neon), 0 0 30px var(--neon), 0 0 60px var(--neon), 0 0 120px var(--neon);
      animation: flicker 4s infinite;
      user-select: none;
    }
    @keyframes flicker {
      0%,95%,100%{opacity:1} 96%{opacity:0.7} 97%{opacity:1} 98%{opacity:0.4} 99%{opacity:1}
    }
    .cam-wrapper {
      position: relative;
      width: clamp(260px, 80vw, 440px);
      aspect-ratio: 3/4;
    }
    .cam-wrapper::before,.cam-wrapper::after,.cam-wrapper .corner-br,.cam-wrapper .corner-bl {
      content: ''; position: absolute; width: 28px; height: 28px; z-index: 20;
    }
    .cam-wrapper::before { top:-2px;left:-2px;border-top:3px solid var(--neon);border-left:3px solid var(--neon);box-shadow:-2px -2px 10px var(--neon); }
    .cam-wrapper::after  { top:-2px;right:-2px;border-top:3px solid var(--neon);border-right:3px solid var(--neon);box-shadow:2px -2px 10px var(--neon); }
    .cam-wrapper .corner-br { bottom:-2px;right:-2px;border-bottom:3px solid var(--neon);border-right:3px solid var(--neon);box-shadow:2px 2px 10px var(--neon); }
    .cam-wrapper .corner-bl { bottom:-2px;left:-2px;border-bottom:3px solid var(--neon);border-left:3px solid var(--neon);box-shadow:-2px 2px 10px var(--neon); }
    video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; opacity: 0; pointer-events: none;
    }
    canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      border: 1px solid rgba(0,255,231,0.2);
      border-radius: 2px; display: block;
    }
    #placeholder {
      position: absolute; inset: 0; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,10,20,0.95);
      gap: 14px; text-align: center; padding: 20px;
      transition: opacity 0.6s;
    }
    #placeholder.hide { opacity: 0; pointer-events: none; }
    .icon { font-size: 3rem; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.6} }
    #loadText { font-size: 0.95rem; color: rgba(0,255,231,0.7); letter-spacing: 0.1em; line-height: 1.8; }
    #loadText.err { color: #ff4060; }
    .glitch-line {
      position: absolute; left:0; right:0; height:2px;
      background: linear-gradient(90deg,transparent,var(--neon),transparent);
      opacity:0; z-index:15; pointer-events:none;
      animation: scanLine 5s ease-in-out infinite;
    }
    @keyframes scanLine { 0%{top:0%;opacity:0} 5%{opacity:0.8} 50%{top:100%;opacity:0.8} 55%{opacity:0} 100%{top:100%;opacity:0} }
    .rec-badge {
      position:absolute; top:10px; right:12px;
      display:none; align-items:center; gap:6px;
      font-size:0.75rem; font-weight:600; letter-spacing:0.15em;
      color:#ff003c; text-shadow:0 0 8px #ff003c; z-index:20;
    }
    .rec-badge.visible { display: flex; }
    .rec-dot { width:8px;height:8px;background:#ff003c;border-radius:50%;box-shadow:0 0 8px #ff003c;animation:blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .hud { display:flex;gap:30px;font-size:0.72rem;letter-spacing:0.15em;color:rgba(0,255,231,0.5);text-transform:uppercase; }
    #clock { color:rgba(0,255,231,0.8); }
    .tagline { font-size:0.75rem;letter-spacing:0.35em;color:rgba(255,255,255,0.2);text-transform:uppercase; }
  </style>
</head>
<body>
<div class="container">
  <div class="title">ILUSSIONS</div>
  <div class="cam-wrapper" id="camWrapper">
    <div class="corner-br"></div>
    <div class="corner-bl"></div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="placeholder">
      <div class="icon">👁️</div>
      <p id="loadText">MEMUAT KAMERA…<br>HARAP IZINKAN AKSES KAMERA</p>
    </div>
    <div class="glitch-line"></div>
    <div class="rec-badge" id="recBadge"><div class="rec-dot"></div> LIVE</div>
  </div>
  <div class="hud">
    <span id="clock">--:--:--</span>
    <span>SYS.CAM</span>
    <span>ILUSSIONS.v1</span>
  </div>
  <div class="tagline">seeing is not believing</div>
</div>

<script>
  // Clock
  setInterval(() => {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('id-ID', {hour12:false});
  }, 1000);
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('id-ID', {hour12:false});

  // Auto-start kamera begitu halaman dibuka
  async function startCamera() {
    const video       = document.getElementById('video');
    const canvas      = document.getElementById('canvas');
    const placeholder = document.getElementById('placeholder');
    const loadText    = document.getElementById('loadText');
    const recBadge    = document.getElementById('recBadge');

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } },
        audio: false
      });

      video.srcObject = stream;

      video.onloadedmetadata = () => {
        canvas.width  = video.videoWidth  || 640;
        canvas.height = video.videoHeight || 480;
        placeholder.classList.add('hide');
        recBadge.classList.add('visible');
        drawLoop(video, canvas);
      };

    } catch (err) {
      loadText.innerHTML = '⚠ KAMERA DITOLAK<br><small>Ketuk ikon kunci/kamera di browser → Izinkan → Muat ulang halaman</small>';
      loadText.classList.add('err');
    }
  }

  function drawLoop(video, canvas) {
    const ctx = canvas.getContext('2d');
    function render() {
      if (video.readyState >= 2) {
        // Mirror selfie
        ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        // Neon tint
        ctx.fillStyle = 'rgba(0,255,200,0.03)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Vignette
        const g = ctx.createRadialGradient(
          canvas.width/2, canvas.height/2, canvas.height*0.2,
          canvas.width/2, canvas.height/2, canvas.height*0.85
        );
        g.addColorStop(0, 'rgba(0,0,0,0)');
        g.addColorStop(1, 'rgba(0,5,10,0.5)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Sesekali efek glitch
        if (Math.random() < 0.012) {
          const y = Math.random() * canvas.height;
          const h = Math.random() * 5 + 2;
          try {
            const d = ctx.getImageData(0, y, canvas.width, h);
            ctx.putImageData(d, (Math.random()-0.5)*18, y);
          } catch(e){}
        }
      }
      requestAnimationFrame(render);
    }
    render();
  }

  // Langsung panggil saat halaman selesai load
  window.addEventListener('load', startCamera);
</script>
</body>
</html>
