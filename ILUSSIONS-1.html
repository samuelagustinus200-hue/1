<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ILUSSIONS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{--neon:#00ffe7;--dark:#020a0f;}
    body{background:var(--dark);color:#fff;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,231,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,231,0.04) 1px,transparent 1px);background-size:40px 40px;animation:gridShift 20s linear infinite;pointer-events:none;z-index:0;}
    @keyframes gridShift{0%{background-position:0 0}100%{background-position:40px 40px}}
    body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);pointer-events:none;z-index:10;}

    .container{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;gap:16px;}
    .title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,10vw,7rem);letter-spacing:0.25em;text-shadow:0 0 10px var(--neon),0 0 30px var(--neon),0 0 60px var(--neon),0 0 120px var(--neon);animation:flicker 4s infinite;user-select:none;}
    @keyframes flicker{0%,95%,100%{opacity:1}96%{opacity:0.7}97%{opacity:1}98%{opacity:0.4}99%{opacity:1}}

    .cam-wrapper{position:relative;width:clamp(260px,80vw,440px);aspect-ratio:3/4;}
    .cam-wrapper::before,.cam-wrapper::after,.cam-wrapper .c-br,.cam-wrapper .c-bl{content:'';position:absolute;width:30px;height:30px;z-index:20;}
    .cam-wrapper::before{top:-2px;left:-2px;border-top:3px solid var(--neon);border-left:3px solid var(--neon);box-shadow:-2px -2px 12px var(--neon);}
    .cam-wrapper::after{top:-2px;right:-2px;border-top:3px solid var(--neon);border-right:3px solid var(--neon);box-shadow:2px -2px 12px var(--neon);}
    .cam-wrapper .c-br{bottom:-2px;right:-2px;border-bottom:3px solid var(--neon);border-right:3px solid var(--neon);box-shadow:2px 2px 12px var(--neon);}
    .cam-wrapper .c-bl{bottom:-2px;left:-2px;border-bottom:3px solid var(--neon);border-left:3px solid var(--neon);box-shadow:-2px 2px 12px var(--neon);}

    video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;pointer-events:none;}
    #liveCanvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border:1px solid rgba(0,255,231,0.2);border-radius:2px;display:block;}

    #placeholder{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,10,20,0.95);gap:12px;text-align:center;padding:20px;transition:opacity 0.4s;}
    #placeholder.hide{opacity:0;pointer-events:none;}
    .eye{font-size:3rem;animation:pulse 1.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.6}}
    #loadText{font-size:0.9rem;color:rgba(0,255,231,0.7);letter-spacing:0.1em;line-height:1.8;}
    #loadText.err{color:#ff4060;}

    .glitch-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--neon),transparent);opacity:0;z-index:14;pointer-events:none;animation:scanLine 5s ease-in-out infinite;}
    @keyframes scanLine{0%{top:0%;opacity:0}5%{opacity:0.8}50%{top:100%;opacity:0.8}55%{opacity:0}100%{top:100%;opacity:0}}

    #flash{position:fixed;inset:0;background:white;opacity:0;pointer-events:none;z-index:100;}

    #resultWrap{display:none;flex-direction:column;align-items:center;gap:14px;}
    #resultWrap.show{display:flex;}
    #resultImg{width:clamp(220px,78vw,420px);border:2px solid var(--neon);box-shadow:0 0 25px rgba(0,255,231,0.4),0 0 60px rgba(0,255,231,0.1);border-radius:4px;}
    .result-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.3em;color:var(--neon);text-shadow:0 0 10px var(--neon);}
    .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
    .btn{padding:10px 28px;background:transparent;border:1.5px solid var(--neon);color:var(--neon);font-family:'Rajdhani',sans-serif;font-size:0.95rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:color 0.3s;box-shadow:0 0 10px rgba(0,255,231,0.15);}
    .btn::before{content:'';position:absolute;inset:0;background:var(--neon);transform:scaleX(0);transform-origin:left;transition:transform 0.3s;z-index:-1;}
    .btn:hover{color:#020a0f;}
    .btn:hover::before{transform:scaleX(1);}
    .btn.red{border-color:#ff003c;color:#ff003c;}
    .btn.red::before{background:#ff003c;}
    .btn.red:hover{color:#fff;}

    .hud{display:flex;gap:24px;font-size:0.72rem;letter-spacing:0.15em;color:rgba(0,255,231,0.5);text-transform:uppercase;}
    #clock{color:rgba(0,255,231,0.8);}
    .tagline{font-size:0.75rem;letter-spacing:0.35em;color:rgba(255,255,255,0.2);text-transform:uppercase;}
  </style>
</head>
<body>
<div id="flash"></div>
<div class="container">
  <div class="title">ILUSSIONS</div>

  <div id="liveView" style="display:flex;flex-direction:column;align-items:center;gap:14px;">
    <div class="cam-wrapper">
      <div class="c-br"></div><div class="c-bl"></div>
      <video id="video" autoplay playsinline muted></video>
      <canvas id="liveCanvas"></canvas>
      <div id="placeholder">
        <div class="eye">👁️</div>
        <p id="loadText">MEMUAT KAMERA…<br>IZINKAN AKSES KAMERA</p>
      </div>
      <div class="glitch-line"></div>
    </div>
  </div>

  <div id="resultWrap">
    <div class="result-title">📸 FOTO KAMU</div>
    <img id="resultImg" src="" alt="foto"/>
    <div class="btn-row">
      <a id="dlLink" download="ILUSSIONS_foto.png" style="text-decoration:none;">
        <button class="btn">💾 SIMPAN</button>
      </a>
      <button class="btn red" onclick="retake()">🔄 ULANGI</button>
    </div>
  </div>

  <div class="hud">
    <span id="clock">--:--:--</span>
    <span>SYS.CAM</span>
    <span>ILUSSIONS.v1</span>
  </div>
  <div class="tagline">seeing is not believing</div>
</div>

<script>
  setInterval(()=>{
    document.getElementById('clock').textContent=new Date().toLocaleTimeString('id-ID',{hour12:false});
  },1000);
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('id-ID',{hour12:false});

  let videoEl, liveCanvas, liveCtx, animId, photoTaken=false;

  async function startCamera() {
    videoEl    = document.getElementById('video');
    liveCanvas = document.getElementById('liveCanvas');
    const placeholder = document.getElementById('placeholder');
    const loadText    = document.getElementById('loadText');

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'user', width:{ideal:1280}, height:{ideal:960}},
        audio:false
      });
      videoEl.srcObject = stream;

      videoEl.onloadedmetadata = () => {
        liveCanvas.width  = videoEl.videoWidth  || 640;
        liveCanvas.height = videoEl.videoHeight || 480;
        liveCtx = liveCanvas.getContext('2d');
        placeholder.classList.add('hide');

        // Gambar 1 frame dulu biar tidak blank, lalu langsung foto
        videoEl.requestVideoFrameCallback
          ? videoEl.requestVideoFrameCallback(() => capturePhoto())
          : setTimeout(() => capturePhoto(), 300);
      };

    } catch(e) {
      loadText.innerHTML = '⚠ KAMERA DITOLAK<br><small>Ketuk ikon kamera di browser → Izinkan → Muat ulang</small>';
      loadText.classList.add('err');
    }
  }

  function capturePhoto() {
    if(!liveCtx || photoTaken) return;
    photoTaken = true;

    // Ambil 1 frame langsung dari video
    liveCtx.save();
    liveCtx.translate(liveCanvas.width, 0);
    liveCtx.scale(-1, 1);
    liveCtx.drawImage(videoEl, 0, 0, liveCanvas.width, liveCanvas.height);
    liveCtx.restore();

    // Vignette
    const g = liveCtx.createRadialGradient(liveCanvas.width/2,liveCanvas.height/2,liveCanvas.height*0.2,liveCanvas.width/2,liveCanvas.height/2,liveCanvas.height*0.85);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(1,'rgba(0,5,10,0.5)');
    liveCtx.fillStyle=g;
    liveCtx.fillRect(0,0,liveCanvas.width,liveCanvas.height);

    // Flash effect
    const flash = document.getElementById('flash');
    flash.style.transition = 'none';
    flash.style.opacity = '1';
    setTimeout(()=>{ flash.style.transition='opacity 0.5s'; flash.style.opacity='0'; }, 60);

    // Buat foto final dengan watermark
    const fc   = document.createElement('canvas');
    fc.width   = liveCanvas.width;
    fc.height  = liveCanvas.height;
    const fctx = fc.getContext('2d');
    fctx.drawImage(liveCanvas, 0, 0);

    const wm = Math.round(fc.width * 0.08);
    fctx.font = `bold ${wm}px 'Bebas Neue', sans-serif`;
    fctx.textAlign = 'center';
    fctx.shadowColor = '#00ffe7';
    fctx.shadowBlur  = 18;
    fctx.fillStyle   = 'rgba(0,255,231,0.55)';
    fctx.fillText('ILUSSIONS', fc.width/2, fc.height - Math.round(fc.height*0.03));
    fctx.shadowBlur  = 0;
    fctx.font = `${Math.round(fc.width*0.035)}px 'Rajdhani', sans-serif`;
    fctx.fillStyle = 'rgba(0,255,231,0.35)';
    fctx.fillText(new Date().toLocaleString('id-ID'), fc.width/2, fc.height - Math.round(fc.height*0.005));

    const dataURL = fc.toDataURL('image/png');
    document.getElementById('resultImg').src = dataURL;
    document.getElementById('dlLink').href   = dataURL;

    setTimeout(()=>{
      document.getElementById('liveView').style.display = 'none';
      document.getElementById('resultWrap').classList.add('show');
    }, 200);
  }

  function retake() {
    photoTaken = false;
    document.getElementById('resultWrap').classList.remove('show');
    document.getElementById('liveView').style.display = 'flex';

    // Langsung foto lagi frame pertama
    videoEl.requestVideoFrameCallback
      ? videoEl.requestVideoFrameCallback(() => capturePhoto())
      : setTimeout(() => capturePhoto(), 300);
  }

  window.addEventListener('load', startCamera);
</script>
</body>
</html>
